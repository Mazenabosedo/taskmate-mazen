{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <link rel="icon" href="{% static 'images/logo.png' %}" type="image/gif" sizes="16x16">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <a class="navbar-brand" href="{%url 'index'%}"
        ><img
          src="{% static 'images/logo.png' %}"
          alt="Taskmate"
          style="height: 40px"
      /></a>
      
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item active">
            <li class="nav-item">
            <a class="nav-link" href="{%url 'index'%}">Index</a>
            <a class="nav-link" href="{%url 'todolist'%}"
              >todolist<span class="sr-only">(current)</span></a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{%url 'about'%}">about us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{%url 'contact'%}">contact us</a>
          </li>
        </ul>        
      </div>      
          {% if user.is_authenticated %}
            <form method="POST" class="form-inline my-2 my-lg-0" action="{% url 'logout' %}">
              {% csrf_token %}
              <span class="text-white mr-2">{{user.username}}</span>
              <a href="{% url 'logout' %}">
                <button class="btn btn-info" type="submit">Logout</button>
              </a>
            </form>
          {% else %}
             <a href="{% url 'login' %}">
                <button class="btn btn-success mr-2" type="submit">Login</button>
             <a href="{% url 'register' %}">
                <button class="btn btn-primary " type="submit">Register</button>
          {% endif %}</a>

      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbarText"
        aria-controls="navbarText"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
      
        <span class="navbar-toggler-icon"></span>
      </button>
    </nav>
    {% block title %}{% endblock title %}
  </head>
  <body class= "bg-light">
    {% block content %}{% endblock content %}
    <!-- Optional JavaScript -->
    <!-- jQuery and Bootstrap Bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
